<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>{{ SITE_NAME }}</title></head>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;color:#333;">
<h2 style="color:#f97316;">{{ SITE_NAME }}</h2>
<p>Dear {{ user.get_full_name|default:user.email }},</p>
<p>A new invoice has been issued for your account.</p>
<ul>
  <li><strong>Invoice Number:</strong> #{{ invoice_number }}</li>
  <li><strong>Amount:</strong> £{{ invoice.total }}</li>
  <li><strong>Due Date:</strong> {{ invoice.due_date }}</li>
</ul>
<p>Please log in to your portal to pay this invoice.</p>
<hr><p style="font-size:12px;color:#666;">© {{ SITE_NAME }}</p>
</body></html>
