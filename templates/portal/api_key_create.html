{% extends "base_portal.html" %}
{% block title %}Create API Key · {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-8">
  <h1 class="text-xl font-semibold text-slate-800 mb-6">Create API Key</h1>
  <form method="post" class="bg-white rounded-xl border border-slate-200 p-6 space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Key name</label>
      <input type="text" name="name" required class="w-full border border-slate-300 rounded px-3 py-2 text-sm" placeholder="e.g. My automation script">
    </div>
    <div class="flex gap-4 pt-2">
      <button type="submit" class="px-4 py-2 rounded bg-sky-600 text-white text-sm font-medium hover:bg-sky-700">Create</button>
      <a href="{% url 'portal:api_key_list' %}" class="text-sm text-slate-500 self-center">Cancel</a>
    </div>
  </form>
  <p class="text-xs text-slate-400 mt-4">The full key will be shown once after creation. Store it securely.</p>
</div>
{% endblock %}
