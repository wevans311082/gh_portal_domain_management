{% extends "base_admin.html" %}
{% block title %}FAQ · {{ SITE_NAME }}{% endblock %}
{% block page_title %}{% if mode == 'create' %}New FAQ{% else %}Edit FAQ{% endif %}{% endblock %}
{% block content %}
<form method="post" class="bg-white rounded-xl border border-slate-200 p-6 max-w-3xl space-y-4">{% csrf_token %}
  {{ form.as_p }}
  <button class="px-4 py-2 rounded bg-sky-600 text-white">Save</button>
  <a href="{% url 'admin_tools:faq_list' %}" class="ml-3 text-sm text-slate-500">Back</a>
</form>
{% endblock %}
