{% extends "base.html" %}
{% block title %}{{ page.title }} · {{ SITE_NAME }}{% endblock %}
{% block body %}
<section class="py-16 bg-slate-50 min-h-screen">
  <div class="max-w-4xl mx-auto px-4">
    <div class="bg-white rounded-xl border border-slate-200 p-8">
      <h1 class="text-3xl font-bold text-slate-900">{{ page.title }}</h1>
      {% if page.summary %}<p class="text-slate-500 mt-2">{{ page.summary }}</p>{% endif %}
      <article class="prose prose-slate max-w-none mt-6 whitespace-pre-line text-sm leading-7">{{ page.content }}</article>
    </div>
  </div>
</section>
{% endblock %}
