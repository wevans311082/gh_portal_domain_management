<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/svg+xml" href="{% static 'images/logo.svg' %}">
    <!-- Tailwind CSS -->
    <script src="{% static 'js/tailwind-config.js' %}"></script>
    <script src="{% static 'vendor/tailwindcss-cdn.js' %}"></script>
    <!-- Alpine.js CSP build -->
    <script defer src="{% static 'vendor/alpine-csp-3.14.1.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-sky-50">
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
        {% for message in messages %}
        <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 4000)"
             class="px-4 py-3 rounded shadow-lg text-sm font-medium {% if message.tags == 'error' %}bg-red-600{% elif message.tags == 'success' %}bg-emerald-600{% else %}bg-sky-600{% endif %} text-white">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block body %}{% endblock %}

    {% include "partials/resellerclub_debug_tray.html" %}

    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
